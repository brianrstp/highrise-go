name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ['1.26']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (without race on Windows, with race on Linux)
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            go test -count=1 ./...
          else
            go test -race -count=1 ./...
          fi
        shell: bash

      - name: Benchmark (Linux only)
        if: runner.os == 'Linux'
        run: go test -bench=. -benchmem -count=1 ./... | tee benchmark.txt
